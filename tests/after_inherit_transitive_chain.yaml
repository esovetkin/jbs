# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Table-valued global 'p'
  - name: p
    parameter:
      - name: _ji_p
        type: int
        mode: text
        _: 0,1,2,3,4,5
      - name: a
        mode: python
        _: '[1,1,1,2,2,2][$_ji_p]'
      - name: b
        mode: python
        _: '["x","y","z","x","y","z"][$_ji_p]'
      - name: c
        mode: python
        _: '["u","v","w","u","v","w"][$_ji_p]'

  # Synthetic subset parameterset for step 's0' derived from 'p' for variable-only imports
  - name: _js__s0__p__a
    parameter:
      - name: _ji__s0__p__a
        type: int
        mode: text
        _: 0,3
      # Internal helper: grouped source row IDs stay opaque with separator #### for after-step narrowing
      - name: _jr__s0__p__a
        mode: python
        separator: '####'
        _: '{"0":"0,1,2","3":"3,4,5"}["${_ji__s0__p__a}"]'
      - name: a
        mode: python
        _: '[1,1,1,2,2,2][$_ji__s0__p__a]'

  # Synthetic subset parameterset for step 's1' derived from 'p' for variable-only imports
  - name: _js__s1__p__b
    parameter:
      - name: _ji__s1__p__b
        type: int
        mode: text
        separator: ','
        _: $_jr__s0__p__a
      - name: _jr__s1__p__b
        mode: text
        _: ${_ji__s1__p__b}
      - name: b
        mode: python
        _: '["x","y","z","x","y","z"][$_ji__s1__p__b]'

  # Synthetic subset parameterset for step 's2' derived from 'p' for variable-only imports
  - name: _js__s2__p__c
    parameter:
      - name: _ji__s2__p__c
        type: int
        mode: text
        separator: ','
        _: $_jr__s1__p__b
      - name: _jr__s2__p__c
        mode: text
        _: ${_ji__s2__p__c}
      - name: c
        mode: python
        _: '["u","v","w","u","v","w"][$_ji__s2__p__c]'

# Steps executed by JUBE
step:
  # Step generated from do block 's0'
  - name: s0
    use:
      - _js__s0__p__a
    do:
      - |
        echo ${a}

  # Step generated from do block 's1'; inherits from s0:
  # - a
  - name: s1
    depend: s0
    use:
      - _js__s1__p__b
    do:
      - |
        echo ${a} ${b}

  # Step generated from do block 's2'; inherits from s1:
  # - a
  # - b
  - name: s2
    depend: s1
    use:
      - _js__s2__p__c
    do:
      - |
        echo ${a} ${b} ${c}
