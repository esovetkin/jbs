# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'p'
  - name: p
    parameter:
      - name: _jbs__idx_p
        type: int
        mode: text
        _: 0,1,2,3,4,5
      - name: a
        mode: python
        _: '[1,1,1,2,2,2][$_jbs__idx_p]'
      - name: b
        mode: python
        _: '["x","y","z","x","y","z"][$_jbs__idx_p]'
      - name: c
        mode: python
        _: '["u","v","w","u","v","w"][$_jbs__idx_p]'

  # Synthetic subset parameterset for step 's0' derived from 'p' for variable-only imports
  - name: _jbs__subset_s0_p__a
    parameter:
      - name: _jbs__idx__jbs__subset_s0_p__a
        type: int
        mode: text
        _: 0,3
      - name: _jbs__rows__jbs__subset_s0_p__a
        mode: python
        separator: '####'
        _: '{"0":"0,1,2","3":"3,4,5"}["${_jbs__idx__jbs__subset_s0_p__a}"]'
      - name: a
        mode: python
        _: '[1,1,1,2,2,2][$_jbs__idx__jbs__subset_s0_p__a]'

  # Synthetic subset parameterset for step 's1' derived from 'p' for variable-only imports
  - name: _jbs__subset_s1_p__b
    parameter:
      - name: _jbs__idx__jbs__subset_s1_p__b
        type: int
        mode: text
        separator: ','
        _: $_jbs__rows__jbs__subset_s0_p__a
      - name: _jbs__rows__jbs__subset_s1_p__b
        mode: text
        _: ${_jbs__idx__jbs__subset_s1_p__b}
      - name: b
        mode: python
        _: '["x","y","z","x","y","z"][$_jbs__idx__jbs__subset_s1_p__b]'

  # Synthetic subset parameterset for step 's2' derived from 'p' for variable-only imports
  - name: _jbs__subset_s2_p__c
    parameter:
      - name: _jbs__idx__jbs__subset_s2_p__c
        type: int
        mode: text
        separator: ','
        _: $_jbs__rows__jbs__subset_s1_p__b
      - name: _jbs__rows__jbs__subset_s2_p__c
        mode: text
        _: ${_jbs__idx__jbs__subset_s2_p__c}
      - name: c
        mode: python
        _: '["u","v","w","u","v","w"][$_jbs__idx__jbs__subset_s2_p__c]'

# Steps executed by JUBE
step:
  # Step generated from do block 's0'
  - name: s0
    use:
      - _jbs__subset_s0_p__a
    do:
      - |
        echo ${a}

  # Step generated from do block 's1'; inherits from s0:
  # - a
  - name: s1
    depend: s0
    use:
      - _jbs__subset_s1_p__b
    do:
      - |
        echo ${a} ${b}

  # Step generated from do block 's2'; inherits from s1:
  # - a
  # - b
  - name: s2
    depend: s1
    use:
      - _jbs__subset_s2_p__c
    do:
      - |
        echo ${a} ${b} ${c}
