jbs_name = "test"
jbs_outpath = "test"

param paramset
{
        # comment
        a=["a", "b","c"]
        b=["1","2"]
        c=(1, 2)

        a*b*c
}

do task
        with a from paramset, b from paramset, c from paramset
{
        echo ${a} ${b} ${c}
}

submit benchmark
        after task
        with paramset
{
        # submit comment
        preprocess = {
                export X=1
        }
        args_exec = "python main.py --case ${a} --nnodes ${c}\n"
        postprocess = {
                echo done
        }
}
