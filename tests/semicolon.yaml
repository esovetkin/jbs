# From jbs_name
name: semicolon_demo

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Table-valued global 'cases'
  - name: cases
    parameter:
      - name: _ji_cases
        type: int
        mode: text
        _: 0,1
      - name: x
        mode: python
        _: '[1,2][$_ji_cases]'
      - name: "y"
        mode: python
        _: '["alpha","beta"][$_ji_cases]'

# Pattern sets used for result extraction
patternset:
  # Imported globals from 'p' used for analyse extraction
  - name: p
    pattern:
      # From analyse 'write': alias 'n' for pattern 'p.number'
      - name: _jp__p_number__write__n
        type: int
        _: 'Number: $jube_pat_int'
      # From analyse 'write': alias 'w' for pattern 'p.word'
      - name: _jp__p_word__write__w
        type: string
        _: 'Word: $jube_pat_wrd'

# Steps executed by JUBE
step:
  # Step generated from do block 'write'
  - name: write
    use:
      - cases
    do:
      - |
        echo "Number: ${x}" > out.log
        echo "Word: ${y}" >> out.log

# Analyser definitions for parsing step output files
analyser:
  # Analyser generated from analyse block 'write'
  - name: analyser_write
    use: p
    analyse:
      - step: write
        file:
          - use: p
            _: out.log

# Result tables generated from analyser output
result:
  use:
    - analyser_write
  table:
    # Result table generated from analyse block 'write'
    - name: result_write
      style: csv
      column:
        - title: x
          _: x
        - title: "y"
          _: "y"
        - title: "n"
          _: _jp__p_number__write__n
        - title: w
          _: _jp__p_word__write__w
