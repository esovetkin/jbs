# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'params'
  - name: params
    parameter:
      - name: _jbs__idx_params
        type: int
        mode: text
        _: 0,1,2
      - name: a
        mode: python
        _: '["a","b","c"][$_jbs__idx_params]'
      - name: x
        mode: python
        _: '[1,2,3][$_jbs__idx_params]'

# Pattern sets used for result extraction
patternset:
  # Patterns block 'p'
  - name: p
    pattern:
      # From analyse 'write': alias 'p0' for pattern 'p.number'
      - name: _jbs_pattern__p_number__write__p0
        type: int
        _: 'Number: $jube_pat_int'
      # From analyse 'write': alias 'p1' for pattern 'p.zahl'
      - name: _jbs_pattern__p_zahl__write__p1
        type: int
        _: 'Zahl: $jube_pat_int'
      # From analyse 'write': alias 'p2' for pattern 'p.letter'
      - name: _jbs_pattern__p_letter__write__p2
        type: string
        _: 'Letter: $jube_pat_wrd'

# Steps executed by JUBE
step:
  # Step generated from do block 'write'
  - name: write
    use:
      - params
    do:
      - |
        echo "Number: ${x}" > en
        echo "Letter: ${a}" >> en
        echo "Zahl: ${x}" > de

# Analyser definitions for parsing step output files
analyser:
  # Analyser generated from analyse block 'write'
  - name: analyser_write
    use: p
    analyse:
      - step: write
        file:
          - use: p
            _: en
          - use: p
            _: de

# Result tables generated from analyser output
result:
  use:
    - analyser_write
  table:
    # Result table generated from analyse block 'write'
    - name: result_write
      style: csv
      column:
        - title: a
          _: a
        - title: x
          _: x
        - title: p0
          _: _jbs_pattern__p_number__write__p0
        - title: de zahl
          _: _jbs_pattern__p_zahl__write__p1
        - title: p2
          _: _jbs_pattern__p_letter__write__p2
