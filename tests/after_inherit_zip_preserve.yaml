# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'p'
  - name: p
    parameter:
      - name: _ji_p
        type: int
        mode: text
        _: 0,1
      - name: a
        mode: python
        _: '[1,2][$_ji_p]'
      - name: b
        mode: python
        _: '["x","y"][$_ji_p]'

  # Synthetic subset parameterset for step 's0' derived from 'p' for variable-only imports
  - name: _js__s0__p__a
    parameter:
      - name: _ji__s0__p__a
        type: int
        mode: text
        _: 0,1
      - name: _jr__s0__p__a
        mode: python
        separator: '####'
        _: '{"0":"0","1":"1"}["${_ji__s0__p__a}"]'
      - name: a
        mode: python
        _: '[1,2][$_ji__s0__p__a]'

  # Synthetic subset parameterset for step 's1' derived from 'p' for variable-only imports
  - name: _js__s1__p__b
    parameter:
      - name: _ji__s1__p__b
        type: int
        mode: text
        separator: ','
        _: $_jr__s0__p__a
      - name: _jr__s1__p__b
        mode: text
        _: ${_ji__s1__p__b}
      - name: b
        mode: python
        _: '["x","y"][$_ji__s1__p__b]'

# Steps executed by JUBE
step:
  # Step generated from do block 's0'
  - name: s0
    use:
      - _js__s0__p__a
    do:
      - |
        echo ${a}

  # Step generated from do block 's1'; inherits from s0:
  # - a
  - name: s1
    depend: s0
    use:
      - _js__s1__p__b
    do:
      - |
        echo ${a} ${b}
