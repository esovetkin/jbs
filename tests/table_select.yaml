# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Table-valued global 'view'
  - name: view
    parameter:
      - name: _ji_view
        type: int
        mode: text
        _: 0,1,2,3
      - name: replica
        mode: python
        _: '[0,1,0,1][$_ji_view]'
      - name: id
        mode: python
        _: '[1,1,2,2][$_ji_view]'

# Steps executed by JUBE
step:
  # Step generated from do block 'run'
  - name: run
    use:
      - view
    do:
      - |
        echo ${replica} ${id}
