# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Synthetic subset parameterset for step 's1' derived from 'l' for variable-only imports
  - name: _js__s1__l__queue_systemname
    parameter:
      - name: queue
        mode: text
        _: batch
      - name: systemname
        mode: shell
        _: hostname | tr -d '\n'

# Steps executed by JUBE
step:
  # Step generated from do block 's1'
  - name: s1
    use:
      - _js__s1__l__queue_systemname
    do:
      - |
        echo ${systemname} ${queue}
