# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'p'
  - name: p
    parameter:
      - name: _ji_p
        type: int
        mode: text
        _: 0,1
      - name: a
        mode: python
        _: '[1,2][$_ji_p]'

  # Parameters for submit block 'run'
  - name: run__submit_params
    init_with: platform.xml:systemParameter
    parameter:
      - name: queue
        _: batch
      - name: account
        _: proj
      - name: args_exec
        _: -lc hostname
      - name: tasks
        type: int
        _: $nodes

# Steps executed by JUBE
step:
  # Step generated from do block 'prep'
  - name: prep
    max_async: 0
    procs: 1
    iterations: 2
    use:
      - p
    do:
      - |
        echo ${a}

  # Step generated from submit block 'run'; inherits from prep:
  # - a
  - name: run
    depend: prep
    max_async: 3
    procs: 5
    iterations: 4
    use:
      - run__submit_params
      - from: platform.xml
        _: jobfiles
      - from: platform.xml
        _: executesub
      - from: platform.xml
        _: executeset
    do:
      - done_file: $done_file
        error_file: $error_file
        _: ${submit} --parsable ${submit_script} > run.jobid
      - echo "true" > success
