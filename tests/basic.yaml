# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Table-valued global 'matrix'
  - name: matrix
    parameter:
      - name: _ji_matrix
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_ji_matrix]'
      - name: nnodes
        mode: python
        _: '[1,2][$_ji_matrix]'

  # Synthetic subset parameterset for step 'setup' derived from 'matrix' for variable-only imports
  - name: _js__setup__matrix__case
    parameter:
      - name: _ji__setup__matrix__case
        type: int
        mode: text
        _: 0,1
      # Internal helper: grouped source row IDs stay opaque with separator #### for after-step narrowing
      - name: _jr__setup__matrix__case
        mode: python
        separator: '####'
        _: '{"0":"0","1":"1"}["${_ji__setup__matrix__case}"]'
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_ji__setup__matrix__case]'

  # Parameters for submit block 'run'
  - name: run__submit_params
    init_with: platform.xml:systemParameter
    parameter:
      - name: preprocess
        mode: text
        _: |
          export X=1
      - name: args_exec
        _: python main.py --case ${case} --nnodes ${nnodes}
      - name: tasks
        type: int
        _: $nodes

  # Synthetic subset parameterset for step 'run' derived from 'matrix' for variable-only imports
  - name: _js__run__matrix__nnodes
    parameter:
      - name: _ji__run__matrix__nnodes
        type: int
        mode: text
        separator: ','
        _: $_jr__setup__matrix__case
      - name: _jr__run__matrix__nnodes
        mode: text
        _: ${_ji__run__matrix__nnodes}
      - name: nnodes
        mode: python
        _: '[1,2][$_ji__run__matrix__nnodes]'

# Steps executed by JUBE
step:
  # Step generated from do block 'setup'
  - name: setup
    use:
      - _js__setup__matrix__case
    do:
      - |
        echo setup ${case}

  # Step generated from submit block 'run'; inherits from setup:
  # - case
  - name: run
    depend: setup
    use:
      - _js__run__matrix__nnodes
      - run__submit_params
      - from: platform.xml
        _: jobfiles
      - from: platform.xml
        _: executesub
      - from: platform.xml
        _: executeset
    do:
      - done_file: $done_file
        error_file: $error_file
        _: ${submit} --parsable ${submit_script} > run.jobid
      - echo "true" > success
