# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'matrix'
  - name: matrix
    parameter:
      - name: _jbs__idx_matrix
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_jbs__idx_matrix]'
      - name: nnodes
        mode: python
        _: '[1,2][$_jbs__idx_matrix]'

  # Synthetic subset parameterset for step 'setup' derived from 'matrix' for variable-only imports
  - name: _jbs__subset_setup_matrix__case
    parameter:
      - name: _jbs__idx__jbs__subset_setup_matrix__case
        type: int
        mode: text
        _: 0,1
      - name: _jbs__rows__jbs__subset_setup_matrix__case
        mode: python
        separator: '####'
        _: '{"0":"0","1":"1"}["${_jbs__idx__jbs__subset_setup_matrix__case}"]'
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_jbs__idx__jbs__subset_setup_matrix__case]'

  # Parameters for submit block 'run'
  - name: run__submit_params
    init_with: platform.xml:systemParameter
    parameter:
      - name: preprocess
        mode: text
        separator: '|'
        _: |
          export X=1
      - name: args_exec
        _: python main.py --case ${case} --nnodes ${nnodes}

  # Synthetic subset parameterset for step 'run' derived from 'matrix' for variable-only imports
  - name: _jbs__subset_run_matrix__nnodes
    parameter:
      - name: _jbs__idx__jbs__subset_run_matrix__nnodes
        type: int
        mode: text
        separator: ','
        _: $_jbs__rows__jbs__subset_setup_matrix__case
      - name: _jbs__rows__jbs__subset_run_matrix__nnodes
        mode: text
        _: ${_jbs__idx__jbs__subset_run_matrix__nnodes}
      - name: nnodes
        mode: python
        _: '[1,2][$_jbs__idx__jbs__subset_run_matrix__nnodes]'

# Steps executed by JUBE
step:
  # Step generated from do block 'setup'
  - name: setup
    use:
      - _jbs__subset_setup_matrix__case
    do:
      - |
        echo setup ${case}

  # Step generated from submit block 'run'; inherits from setup:
  # - case
  - name: run
    depend: setup
    use:
      - _jbs__subset_run_matrix__nnodes
      - run__submit_params
      - from: platform.xml
        _: jobfiles
      - from: platform.xml
        _: executesub
      - from: platform.xml
        _: executeset
    do:
      - done_file: $done_file
        error_file: $error_file
        _: ${submit} --parsable ${submit_script} > run.jobid
      - echo "true" > success
