# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'matrix'
  - name: matrix
    parameter:
      - name: _jbs__idx_matrix
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_jbs__idx_matrix]'
      - name: nnodes
        mode: python
        _: '[1,2][$_jbs__idx_matrix]'

  # Synthetic subset parameterset derived from 'matrix' for variable-only imports
  - name: _jbs__subset_matrix__case
    parameter:
      - name: _jbs__idx__jbs__subset_matrix__case
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$_jbs__idx__jbs__subset_matrix__case]'

  # Parameters for submit block 'run'
  - name: run__submit_params
    init_with: platform.xml:systemParameter
    parameter:
      - name: preprocess
        mode: text
        separator: '|'
        _: |
          export X=1
      - name: args_exec
        _: python main.py --case ${case} --nnodes ${nnodes}

# Steps executed by JUBE
step:
  # Step generated from do block 'setup'
  - name: setup
    use:
      - _jbs__subset_matrix__case
    do:
      - |
        echo setup ${case}

  # Step generated from submit block 'run'
  - name: run
    depend: setup
    use:
      - matrix
      - run__submit_params
      - from: platform.xml
        _: jobfiles
      - from: platform.xml
        _: executesub
      - from: platform.xml
        _: executeset
    do:
      - done_file: $done_file
        error_file: $error_file
        _: ${submit} --parsable ${submit_script} > run.jobid
      - echo "true" > success
