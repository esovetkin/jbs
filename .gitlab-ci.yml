.checks_job_template:
  image: golang:1.25
  tags:
    - public-docker
  variables:
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
    GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
  cache:
    key: "go-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/go-build/
      - .cache/go-mod/
  before_script:
    - mkdir -p "$GOCACHE" "$GOMODCACHE"
    - go version
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - when: never

stages:
  - test
  - coverage
  - build
  - release

test:
  extends: .checks_job_template
  stage: test
  script:
    - make test
    - make testrace

coverage:
  extends: .checks_job_template
  stage: coverage
  script:
    - make coverage
  coverage: '/Overall coverage:\s+(\d+(?:\.\d+)?%)/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - coverage.out
      - coverage.html

build:
  extends: .checks_job_template
  stage: build
  script:
    - make build

release:
  extends: .checks_job_template
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
    - when: never
  script:
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 make build
  artifacts:
    name: "jbs-${CI_COMMIT_TAG}"
    expire_in: never
    paths:
      - jbs

upload:
  image: registry.gitlab.com/gitlab-org/cli:latest
  tags:
    - public-docker
  stage: release
  needs:
    - job: release
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
    - when: never
  script:
    - test -s jbs
  artifacts:
    name: "jbs-${CI_COMMIT_TAG}"
    expire_in: never
    paths:
      - jbs
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "JBS $CI_COMMIT_TAG"
    description: "JBS $CI_COMMIT_TAG"
    assets:
      links:
        - name: "jbs-linux-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/jbs"
          filepath: "/jbs-linux-amd64"
          link_type: "package"
