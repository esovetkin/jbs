.template:
  id_tokens:
    SITE_ID_TOKEN:
      aud: "https://gitlab.jsc.fz-juelich.de"
  variables:
    CUSTOM_CI_BUILDS_DIR: "/p/scratch/atmlaml/jacamar-ci"
  tags:
    - juwels_booster
    - login

stages:
  - deploy
  - jube_testing

coverage_report:
  extends: .template
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - when: never
  before_script:
    - mkdir -p "$CUSTOM_CI_BUILDS_DIR/.cache/go-build" "$CUSTOM_CI_BUILDS_DIR/.cache/go-mod"
    - export GOCACHE="$CUSTOM_CI_BUILDS_DIR/.cache/go-build"
    - export GOMODCACHE="$CUSTOM_CI_BUILDS_DIR/.cache/go-mod"
  script:
    - module load Go
    - make coverage
  coverage: '/Overall coverage:\s+(\d+(?:\.\d+)?%)/'

build_test_install:
  extends: .template
  stage: deploy
  variables:
    INSTALL_DIR: "/p/project1/atmlaml/sovetkin1/jbs/bin"
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        INSTALL_SUFFIX: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
      variables:
        INSTALL_SUFFIX: "$CI_COMMIT_BRANCH"
    - when: never
  before_script:
    - mkdir -p "$CUSTOM_CI_BUILDS_DIR/.cache/go-build" "$CUSTOM_CI_BUILDS_DIR/.cache/go-mod"
    - export GOCACHE="$CUSTOM_CI_BUILDS_DIR/.cache/go-build"
    - export GOMODCACHE="$CUSTOM_CI_BUILDS_DIR/.cache/go-mod"
  script:
    - module load Go
    - make test
    - make build
    - mkdir -p "$INSTALL_DIR"
    - SAFE_SUFFIX="$(printf '%s' "$INSTALL_SUFFIX" | sed 's#[^A-Za-z0-9._-]#_#g')"
    - INSTALL_NAME="jbs_${SAFE_SUFFIX}"
    - install -m 0755 jbs "$INSTALL_DIR/$INSTALL_NAME"
    - echo "Installed $INSTALL_DIR/$INSTALL_NAME"

jube_testing:
  extends: .template
  stage: jube_testing
  needs:
    - build_test_install
  variables:
    INSTALL_DIR: "/p/project1/atmlaml/sovetkin1/jbs/bin"
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        INSTALL_SUFFIX: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
      variables:
        INSTALL_SUFFIX: "$CI_COMMIT_BRANCH"
    - when: never
  script:
    - module load JUBE
    - SAFE_SUFFIX="$(printf '%s' "$INSTALL_SUFFIX" | sed 's#[^A-Za-z0-9._-]#_#g')"
    - JBS_BIN="$INSTALL_DIR/jbs_${SAFE_SUFFIX}"
    - test -x "$JBS_BIN"
    - mkdir -p .jube-testing
    - |
      set -euo pipefail
      for jbs_file in examples/*.jbs; do
        name="$(basename "$jbs_file" .jbs)"
        run_dir=".jube-testing/$name"
        rm -rf "$run_dir"
        mkdir -p "$run_dir"
        "$JBS_BIN" "$CI_PROJECT_DIR/$jbs_file" -o "$run_dir/$name.yaml"
        (
          cd "$run_dir"
          jube-autorun "$name.yaml"
          jube status out | grep -q "FINISHED"
        )
      done
