# From jbs_name
name: jbs_benchmark

# From jbs_outpath
outpath: out

# Parameter sets used to create workpackage combinations
parameterset:
  # Param block 'matrix'
  - name: matrix
    parameter:
      - name: i
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$i]'
      - name: nnodes
        mode: python
        _: '[1,2][$i]'

  # Synthetic subset parameterset derived from 'matrix' for variable-only imports
  - name: __subset_matrix__case
    parameter:
      - name: i
        type: int
        mode: text
        _: 0,1
      - name: case
        mode: python
        _: '["ddp","fsdp"][$i]'

  # Parameters for submit block 'run'
  - name: run__submit_params
    init_with: platform.xml:systemParameter
    parameter:
      # From jbs_systemname
      - name: systemname
        mode: python
        _: '__import__("os").environ.get("SYSTEMNAME", "")'
      # From jbs_queue
      - name: queue
        mode: python
        _: '__import__("os").environ.get("JUBE_QUEUE", {"juwelsbooster":"develbooster","jurecadc":"dc-gpu-devel","jusuf":"batch"}["${jbs_systemname}"])'
      # From jbs_account
      - name: account
        mode: python
        _: '__import__("os").environ.get("JUBE_ACCOUNT", "atmlaml")'
      # From jbs_timelimit
      - name: timelimit
        mode: python
        _: '__import__("os").environ.get("JUBE_TIMELIMIT", "00:15:00")'
      # From jbs_outlogfile
      - name: outlogfile
        _: job.out
      # From jbs_outerrfile
      - name: outerrfile
        _: job.err
      # From jbs_gres
      - name: gres
        _: gpu:4
      # From jbs_threadspertask
      - name: threadspertask
        type: int
        _: "48"
      # From jbs_nnodes
      - name: nodes
        type: int
        _: "1"
      # From jbs_tasks
      - name: tasks
        type: int
        _: "1"
      # From jbs_executable
      - name: executable
        _: /bin/bash
      - name: hint
        _: nomultithread
      - name: env
        mode: text
        separator: '|'
        _: |
          set -euo pipefail
          cd "${jube_benchmark_home}"
            export X=1
      - name: args_exec
        _: '  python main.py --case ${case} --nnodes ${nnodes}'

# Steps executed by JUBE
step:
  # Step generated from do block 'setup'
  - name: setup
    use:
      - __subset_matrix__case
    do:
      - |
        set -euo pipefail
        cd "${jube_benchmark_home}"
          echo setup ${case}

  # Step generated from submit block 'run'
  - name: run
    depend: setup
    use:
      - matrix
      - run__submit_params
      - from: platform.xml
        _: jobfiles
      - from: platform.xml
        _: executesub
      - from: platform.xml
        _: executeset
    do:
      - done_file: $done_file
        error_file: $error_file
        _: ${submit} --parsable ${submit_script} > run.jobid
      - echo "true" > success
